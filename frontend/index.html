<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Support CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- NAVBAR -->
  <nav class="bg-blue-600 text-white px-6 py-4 flex justify-between items-center shadow">
    <h1 class="text-xl font-bold cursor-pointer" onclick="showPage('list')">🎫 Support CRM</h1>
    <button onclick="showPage('create')" class="bg-white text-blue-600 px-4 py-2 rounded font-semibold hover:bg-blue-50">+ New Ticket</button>
  </nav>

  <!-- PAGES -->
  <div class="max-w-5xl mx-auto px-4 py-6">

    <!-- LIST PAGE -->
    <div id="page-list">
      <div class="flex gap-3 mb-4">
        <input id="search-input" type="text" placeholder="Search by name, email, ID..." 
          class="flex-1 border rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
          oninput="fetchTickets()"/>
        <select id="status-filter" onchange="fetchTickets()"
          class="border rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="">All Status</option>
          <option value="Open">Open</option>
          <option value="In Progress">In Progress</option>
          <option value="Closed">Closed</option>
        </select>
      </div>
      <div id="tickets-container"></div>
    </div>

    <!-- CREATE PAGE -->
    <div id="page-create" class="hidden">
      <div class="bg-white rounded-xl shadow p-6 max-w-xl mx-auto">
        <h2 class="text-xl font-bold mb-4 text-gray-700">Create New Ticket</h2>
        <div class="space-y-3">
          <input id="c-name" type="text" placeholder="Customer Name"
            class="w-full border rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"/>
          <input id="c-email" type="email" placeholder="Customer Email"
            class="w-full border rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"/>
          <input id="c-subject" type="text" placeholder="Issue Title"
            class="w-full border rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"/>
          <textarea id="c-desc" placeholder="Describe the issue..." rows="4"
            class="w-full border rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>
          <button onclick="createTicket()"
            class="w-full bg-blue-600 text-white py-2 rounded font-semibold hover:bg-blue-700">Submit Ticket</button>
          <p id="create-msg" class="text-center text-sm text-green-600 hidden"></p>
        </div>
      </div>
    </div>

    <!-- DETAIL PAGE -->
    <div id="page-detail" class="hidden">
      <button onclick="showPage('list')" class="mb-4 text-blue-600 hover:underline">← Back to List</button>
      <div class="bg-white rounded-xl shadow p-6">
        <div class="flex justify-between items-start mb-4">
          <div>
            <h2 id="d-subject" class="text-2xl font-bold text-gray-800"></h2>
            <p id="d-ticket-id" class="text-sm text-gray-400 mt-1"></p>
          </div>
          <span id="d-status-badge" class="px-3 py-1 rounded-full text-sm font-semibold"></span>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-4 text-sm text-gray-600">
          <div><span class="font-semibold">Name:</span> <span id="d-name"></span></div>
          <div><span class="font-semibold">Email:</span> <span id="d-email"></span></div>
          <div><span class="font-semibold">Created:</span> <span id="d-created"></span></div>
          <div><span class="font-semibold">Updated:</span> <span id="d-updated"></span></div>
        </div>
        <div class="mb-4">
          <p class="font-semibold text-gray-700 mb-1">Description:</p>
          <p id="d-desc" class="text-gray-600 bg-gray-50 rounded p-3 text-sm"></p>
        </div>

        <!-- UPDATE STATUS -->
        <div class="border-t pt-4 mb-4">
          <p class="font-semibold text-gray-700 mb-2">Update Status</p>
          <div class="flex gap-3">
            <select id="d-status-select"
              class="border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
              <option value="Open">Open</option>
              <option value="In Progress">In Progress</option>
              <option value="Closed">Closed</option>
            </select>
            <button onclick="updateTicket()"
              class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Update</button>
          </div>
        </div>

        <!-- ADD NOTE -->
        <div class="border-t pt-4 mb-4">
          <p class="font-semibold text-gray-700 mb-2">Add Note</p>
          <div class="flex gap-3">
            <input id="d-note-input" type="text" placeholder="Write a note..."
              class="flex-1 border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"/>
            <button onclick="addNote()"
              class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Add</button>
          </div>
        </div>

        <!-- NOTES LIST -->
        <div class="border-t pt-4">
          <p class="font-semibold text-gray-700 mb-2">Notes</p>
          <div id="d-notes" class="space-y-2"></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    let currentTicketId = null;

    const statusColor = {
      "Open": "bg-green-100 text-green-700",
      "In Progress": "bg-yellow-100 text-yellow-700",
      "Closed": "bg-red-100 text-red-700"
    };

    function showPage(page) {
      ["list","create","detail"].forEach(p => {
        document.getElementById("page-" + p).classList.add("hidden");
      });
      document.getElementById("page-" + page).classList.remove("hidden");
      if (page === "list") fetchTickets();
    }

    async function fetchTickets() {
      const search = document.getElementById("search-input").value;
      const status = document.getElementById("status-filter").value;
      let url = "/api/tickets?";
      if (search) url += `search=${encodeURIComponent(search)}&`;
      if (status) url += `status=${encodeURIComponent(status)}`;

      const res = await fetch(url);
      const tickets = await res.json();
      const container = document.getElementById("tickets-container");

      if (tickets.length === 0) {
        container.innerHTML = `<p class="text-center text-gray-400 mt-10">No tickets found.</p>`;
        return;
      }

      container.innerHTML = tickets.map(t => `
        <div onclick="openTicket('${t.ticket_id}')"
          class="bg-white rounded-xl shadow mb-3 p-4 flex justify-between items-center cursor-pointer hover:shadow-md transition">
          <div>
            <p class="font-semibold text-gray-800">${t.subject}</p>
            <p class="text-sm text-gray-500">${t.ticket_id} • ${t.customer_name} • ${new Date(t.created_at).toLocaleDateString()}</p>
          </div>
          <span class="px-3 py-1 rounded-full text-xs font-semibold ${statusColor[t.status]}">${t.status}</span>
        </div>
      `).join("");
    }

    async function createTicket() {
      const body = {
        customer_name: document.getElementById("c-name").value,
        customer_email: document.getElementById("c-email").value,
        subject: document.getElementById("c-subject").value,
        description: document.getElementById("c-desc").value
      };

      if (!body.customer_name || !body.customer_email || !body.subject || !body.description) {
        alert("Please fill all fields!");
        return;
      }

      const res = await fetch("/api/tickets", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(body)
      });

      const data = await res.json();
      const msg = document.getElementById("create-msg");
      msg.textContent = `✅ Ticket created: ${data.ticket_id}`;
      msg.classList.remove("hidden");

      document.getElementById("c-name").value = "";
      document.getElementById("c-email").value = "";
      document.getElementById("c-subject").value = "";
      document.getElementById("c-desc").value = "";

      setTimeout(() => showPage("list"), 1500);
    }

    async function openTicket(ticketId) {
      currentTicketId = ticketId;
      const res = await fetch(`/api/tickets/${ticketId}`);
      const t = await res.json();

      document.getElementById("d-subject").textContent = t.subject;
      document.getElementById("d-ticket-id").textContent = t.ticket_id;
      document.getElementById("d-name").textContent = t.customer_name;
      document.getElementById("d-email").textContent = t.customer_email;
      document.getElementById("d-desc").textContent = t.description;
      document.getElementById("d-created").textContent = new Date(t.created_at).toLocaleString();
      document.getElementById("d-updated").textContent = new Date(t.updated_at).toLocaleString();

      const badge = document.getElementById("d-status-badge");
      badge.textContent = t.status;
      badge.className = `px-3 py-1 rounded-full text-sm font-semibold ${statusColor[t.status]}`;

      document.getElementById("d-status-select").value = t.status;

      const notesDiv = document.getElementById("d-notes");
      if (t.notes && t.notes.length > 0) {
        notesDiv.innerHTML = t.notes.map(n => `
          <div class="bg-gray-50 rounded p-3 text-sm text-gray-700">
            <p>${n.note_text}</p>
            <p class="text-xs text-gray-400 mt-1">${new Date(n.created_at).toLocaleString()}</p>
          </div>
        `).join("");
      } else {
        notesDiv.innerHTML = `<p class="text-sm text-gray-400">No notes yet.</p>`;
      }

      showPage("detail");
    }

    async function updateTicket() {
      const status = document.getElementById("d-status-select").value;
      await fetch(`/api/tickets/${currentTicketId}`, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ status })
      });
      openTicket(currentTicketId);
    }

    async function addNote() {
      const note = document.getElementById("d-note-input").value;
      if (!note) return;
      await fetch(`/api/tickets/${currentTicketId}`, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ note })
      });
      document.getElementById("d-note-input").value = "";
      openTicket(currentTicketId);
    }

    // Load list on start
    fetchTickets();
  </script>

</body>
</html>
